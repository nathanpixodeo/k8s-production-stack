apiVersion: v1
kind: ConfigMap
metadata:
  name: laravel-env
  namespace: myapp
  labels:
    app: laravel
data:
  APP_ENV: production
  APP_DEBUG: "false"
  LOG_LEVEL: info
  LOG_CHANNEL: stderr
  DB_CONNECTION: mysql
  DB_HOST: database-svc
  DB_PORT: "3306"
  DB_DATABASE: myapp
  DB_USERNAME: myapp
  REDIS_HOST: redis-svc
  REDIS_PASSWORD: "null"
  REDIS_PORT: "6379"
  SESSION_DRIVER: redis
  CACHE_DRIVER: redis
  QUEUE_CONNECTION: redis
  FILESYSTEM_DISK: s3
  BROADCAST_DRIVER: log
  SCOUT_DRIVER: meilisearch
