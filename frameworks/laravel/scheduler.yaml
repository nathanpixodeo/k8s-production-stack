apiVersion: batch/v1
kind: CronJob
metadata:
  name: laravel-scheduler
  namespace: myapp
  labels:
    app: laravel
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: myapp-sa
          restartPolicy: OnFailure
          containers:
          - name: scheduler
            image: myapp-laravel:latest
            imagePullPolicy: Always
            command:
            - php
            - /var/www/html/artisan
            - schedule:run
            envFrom:
            - configMapRef:
                name: laravel-env
            - secretRef:
                name: laravel-secrets
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
            securityContext:
              runAsNonRoot: true
              runAsUser: 1001
