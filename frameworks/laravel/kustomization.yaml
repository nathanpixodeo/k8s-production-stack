apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp

resources:
  - ../../application/namespace.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - network-policy.yaml
  - env-configmap.yaml
  - nginx-configmap.yaml
  - deployment.yaml
  - horizon.yaml
  - scheduler.yaml

secretGenerator:
  - name: laravel-secrets
    type: Opaque
    literals:
      - APP_KEY=base64:changeme-laravel-app-key-32-chars
      - DB_PASSWORD=changeme-db-password
      - REDIS_PASSWORD=null

generatorOptions:
  disableNameSuffixHash: true
