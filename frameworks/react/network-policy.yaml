apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-react-ingress
  namespace: myapp
spec:
  podSelector:
    matchLabels:
      app: react
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
