apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-config
  namespace: myapp
  labels:
    app: myapp
data:
  APP_ENV: production
  APP_DEBUG: "false"
  APP_PORT: "8080"
  DB_CONNECTION: mysql
  DB_HOST: database-svc
  DB_PORT: "3306"
  DB_NAME: myapp
  DB_USER: myapp
  REDIS_HOST: redis-svc
  REDIS_PORT: "6379"
  LOG_LEVEL: info
