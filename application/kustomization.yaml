apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml

secretGenerator:
  - name: myapp-secrets
    type: Opaque
    literals:
      - DB_PASSWORD=changeme-db-password
      - REDIS_PASSWORD=changeme-redis-password
      - APP_KEY=base64:changeme-app-key

generatorOptions:
  disableNameSuffixHash: true
