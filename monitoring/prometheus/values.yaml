prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 50GB
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2
        memory: 8Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    remoteWrite: []
    enableRemoteWriteReceiver: false

  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
        slack_api_url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
      route:
        group_by: [namespace, alertname, severity]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: slack-default
        routes:
        - receiver: slack-critical
          match:
            severity: critical
      receivers:
      - name: slack-default
        slack_configs:
        - channel: "#alerts"
          title: '{{ template "slack.default.title" . }}'
          text: '{{ template "slack.default.text" . }}'
      - name: slack-critical
        slack_configs:
        - channel: "#alerts-critical"
          title: '{{ template "slack.default.title" . }}'
          text: '{{ template "slack.default.text" . }}'
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi

grafana:
  enabled: true
  adminPassword: changeme-admin-password
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
    - grafana.example.com
    tls:
    - hosts:
      - grafana.example.com
      secretName: grafana-tls
  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-operated:9090
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      kubernetes-cluster:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-api-server.json
        token: ""
      kubernetes-nodes:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-nodes.json

kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
