apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - network-policies.yaml
  - rbac.yaml

helmCharts:
  - name: sealed-secrets
    repo: https://bitnami-labs.github.io/sealed-secrets
    version: 2.16.0
    releaseName: sealed-secrets
    namespace: kube-system
    valuesFile: sealed-secrets/values.yaml
    includeCRDs: true
