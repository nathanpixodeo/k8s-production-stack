apiVersion: v1
kind: Service
metadata:
  name: database-svc
  namespace: myapp
  labels:
    app: mariadb
spec:
  type: ClusterIP
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
  selector:
    app: mariadb
    role: primary
---
apiVersion: v1
kind: Service
metadata:
  name: database-svc-read
  namespace: myapp
  labels:
    app: mariadb
spec:
  type: ClusterIP
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
  selector:
    app: mariadb
    role: replica
---
apiVersion: v1
kind: Service
metadata:
  name: database-headless
  namespace: myapp
  labels:
    app: mariadb
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
  selector:
    app: mariadb
