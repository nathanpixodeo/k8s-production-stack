apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: myapp
  labels:
    app: mysql
spec:
  type: ClusterIP
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
  selector:
    app: mysql
    role: primary
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc-read
  namespace: myapp
  labels:
    app: mysql
spec:
  type: ClusterIP
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
  selector:
    app: mysql
    role: replica
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: myapp
  labels:
    app: mysql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
  selector:
    app: mysql
