apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp

resources:
  - configmap.yaml
  - service.yaml
  - statefulset.yaml

secretGenerator:
  - name: mysql-secret
    type: Opaque
    literals:
      - ROOT_PASSWORD=changeme-root-password
      - USER_PASSWORD=changeme-user-password

generatorOptions:
  disableNameSuffixHash: true
